version: '3.8'

services:
  # MySQL Database Service
  db:
    image: mysql:8.0
    container_name: furniture_mysql
    restart: always
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_DATABASE: furniture_db
    ports:
      - "3306:3306"
    volumes:
      - furniture_db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - furniture_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  # PHP + Apache Web Server
  web:
    build: .
    container_name: furniture_web
    restart: always
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: ""
      DB_NAME: furniture_db
      DB_PORT: 3306
    depends_on:
      db:
        condition: service_healthy
    networks:
      - furniture_net

volumes:
  furniture_db_data:
    driver: local

networks:
  furniture_net:
    driver: bridge
